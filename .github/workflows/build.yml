name: Build CV

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy-pages.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Two independent LaTeX builds — fr/ and en/ each have their own
      # main.tex and sections/, sharing the logos in assets/logos/ via
      # relative ../assets/logos/... paths. See skills/cv-editor/SKILL.md
      # for how to keep both language versions in sync.
      - name: Compile French CV
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: fr

      - name: Compile English CV
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: en

      - name: Rename compiled PDFs
        run: |
          mv fr/main.pdf CV-CHAOUI-EL-MEHDI-FR.pdf
          mv en/main.pdf CV-CHAOUI-EL-MEHDI-EN.pdf

      - name: Publish (or update) the "latest" release
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: Latest CV
          body: |
            Automatically built from commit ${{ github.sha }}.
            Permanent download links:
            - French: `releases/download/latest/CV-CHAOUI-EL-MEHDI-FR.pdf`
            - English: `releases/download/latest/CV-CHAOUI-EL-MEHDI-EN.pdf`
            Inline browser preview: published via GitHub Pages.
          artifacts: CV-CHAOUI-EL-MEHDI-FR.pdf,CV-CHAOUI-EL-MEHDI-EN.pdf
          allowUpdates: true
          replacesArtifacts: true
          removeArtifacts: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}

      # GitHub Pages serves files with Content-Type: application/pdf and no
      # forced download, unlike Release assets — so these URLs open inline
      # in the browser. Requires Pages enabled once in repo Settings > Pages
      # > Build and deployment > Source: GitHub Actions.
      - name: Prepare Pages content
        run: |
          mkdir -p public
          cp CV-CHAOUI-EL-MEHDI-FR.pdf public/CV-CHAOUI-EL-MEHDI-FR.pdf
          cp CV-CHAOUI-EL-MEHDI-EN.pdf public/CV-CHAOUI-EL-MEHDI-EN.pdf

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deploy-pages
        uses: actions/deploy-pages@v4
